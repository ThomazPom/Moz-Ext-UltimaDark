name: Broken Site Report
description: Report a single website that UltimaDark breaks or displays incorrectly. One site per issue please.
labels: [bug]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Quick Checklist
      description: Please try to confirm what you can — don't worry if you're unsure about some of these.
      options:
        - label: I am using a recent version of UltimaDark on a desktop browser.
          required: false
        - label: I had a quick look at [existing issues](https://github.com/ThomazPom/Moz-Ext-UltimaDark/issues?q=is%3Aissue) and this site does not seem to have been reported yet.
          required: false
        - label: The site is not on my excluded sites list.
          required: false
        - label: I have tried reloading the page and the problem persists.
          required: false
  - type: input
    id: url
    attributes:
      label: Site URL
      placeholder: https://www.example.com
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What is broken?
      description: Describe the visual problem as best you can. Screenshots are very helpful if you can attach some!
      placeholder: "e.g. The navbar text is invisible on a dark background, making the menu unreadable."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior (optional)
      description: If you have an idea of what it should look like instead, let us know.
      placeholder: "e.g. The navbar text should be light-colored so it is readable."
    validations:
      required: false
  - type: textarea
    id: log
    attributes:
      label: Extension Console Log (optional, for advanced users)
      description: |
        If you're comfortable with developer tools, you can grab the extension logs:
        Go to `about:debugging#/runtime/this-firefox`, click "Inspect" on UltimaDark, clear the log, then reload the broken page.
        Don't worry if you don't know how to do this — it's not required!
      render: shell
    validations:
      required: false
  - type: textarea
    id: site_log
    attributes:
      label: Site Console Log (optional, for advanced users)
      description: |
        If you know how to open the browser console (F12 → Console tab), check if there are any errors on the page and paste the relevant lines here.
        Again, no worries if this is not something you're familiar with.
      render: shell
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        > [!CAUTION]
        > **GitHub is experiencing a high volume of malicious spam comments.**
        > If you receive any replies asking you to download a file, do **NOT** follow the download links!
        > This issue may be temporarily locked as an anti-spam measure after it is opened.
